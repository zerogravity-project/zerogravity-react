version: '3.8'

services:
  frontend:
    container_name: zerogv-frontend-${ENV:-prod}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.${ENV:-production}
    restart: unless-stopped
    networks:
      - zerogv-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  zerogv-network:
    driver: bridge
