version: '3.8'

services:
  frontend:
    container_name: zerogv-frontend-${ENV:-prod}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
    env_file:
      - .env.${ENV:-production}
    restart: unless-stopped
    networks:
      - zerogv-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  zerogv-network:
    driver: bridge
