# ==============================================================================
# nginx configuration for zerogv.com (Production)
# ==============================================================================
# This configuration file sets up the production frontend server
# with caching, rate limiting, and security headers.
# ==============================================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=frontend_prod_limit:10m rate=500r/m;

# Upstream backend
upstream frontend_prod {
    server localhost:3000;
    keepalive 32;
}

# Production frontend server
server {
    listen 80 default_server;
    server_name zerogv.com www.zerogv.com _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Client body size limit (10MB for file uploads)
    client_max_body_size 10M;

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $server_name;
        proxy_cache_bypass $http_upgrade;

        # Cache for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js _next/static files (build artifacts)
    location /_next/static/ {
        proxy_pass http://frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $server_name;
        proxy_cache_bypass $http_upgrade;

        # Cache for 1 year (immutable)
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API routes (no caching)
    location /api/ {
        limit_req zone=frontend_prod_limit burst=100 nodelay;

        proxy_pass http://frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # No caching for API
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # All other requests
    location / {
        limit_req zone=frontend_prod_limit burst=100 nodelay;

        proxy_pass http://frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache HTML for 5 minutes
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Health check endpoint (no rate limiting)
    location /api/health {
        proxy_pass http://frontend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host $server_name;
        access_log off;
    }

    # Load Balancer health check endpoint
    location /health {
        proxy_pass http://frontend_prod/api/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        proxy_set_header Host $server_name;
        access_log off;
    }
}
