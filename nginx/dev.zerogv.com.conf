# ==============================================================================
# nginx configuration for dev.zerogv.com (Development)
# ==============================================================================
# This configuration file sets up the development frontend server
# with relaxed rate limiting and shorter caching for faster iteration.
# ==============================================================================

# Rate limiting zone (more relaxed for development)
limit_req_zone $binary_remote_addr zone=frontend_dev_limit:10m rate=1000r/m;

# Upstream backend
upstream frontend_dev {
    server localhost:3001;
    keepalive 32;
}

# Development frontend server
server {
    listen 80;
    server_name dev.zerogv.com _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Client body size limit (10MB for file uploads)
    client_max_body_size 10M;

    # Static files caching (shorter for development)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $server_name;
        proxy_cache_bypass $http_upgrade;

        # Cache for 1 day (dev environment)
        expires 1d;
        add_header Cache-Control "public";
    }

    # Next.js _next/static files
    location /_next/static/ {
        proxy_pass http://frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $server_name;
        proxy_cache_bypass $http_upgrade;

        # Cache for 1 day (dev environment)
        expires 1d;
        add_header Cache-Control "public";
    }

    # API routes (no caching)
    location /api/ {
        limit_req zone=frontend_dev_limit burst=200 nodelay;

        proxy_pass http://frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # No caching for API
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # All other requests
    location / {
        limit_req zone=frontend_dev_limit burst=200 nodelay;

        proxy_pass http://frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache HTML for 1 minute (dev environment)
        expires 1m;
        add_header Cache-Control "public, must-revalidate";
    }

    # Health check endpoint (no rate limiting)
    location /api/health {
        proxy_pass http://frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $server_name;
        access_log off;
    }

    # Load Balancer health check endpoint
    location /health {
        proxy_pass http://frontend_dev/api/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        proxy_set_header Host $server_name;
        access_log off;
    }
}
